# configs/captioner-conf/main.yml
checkpoint:
  save_dir: res_abl_16_h_fine_contr
  model_save_name: res_abl_16_h_fine_contr.pt
  save_best_only: true
  resume: null
  model_checkpoint_path: "/home/public/mkamal/checkpoints" 

data:
  csv_file: "/home/public/mkamal/dataset/filtered_data/train/train_cleaned.csv"  
  h5_file: "/home/public/mkamal/dataset/filtered_data/train/train.h5"  
  max_len: 256
  min_freq: 3
  num_workers: 8
  valid_sz: 0.1
  test_sz: 0.1

model:
  vocab_size: 16000
  d_model: 512
  
  decoder_n_heads: 16
  decoder_ff_dim: 2048
  decoder_max_len: 256
  decoder_layers: 6
  pad_id: 0
  
  fusion_heads: 8
  fusion_ff_dim: 768

  # Swin encoder
  img_enc_backbone: "swin_s" # swin_t, swin_s, swin_b
  img_enc_freeze_layer: 4 # 9 Completely frozen
  use_fpn: False
  fpn_dim: 256   # DONT CHANGE
  fpn_scale: 2   # DONT CHANGE

  # text encoder
  bert_model: "emilyalsentzer/Bio_ClinicalBERT"
  bert_freeze_layer: 8   # Complete froze 12    
  bert_max_length: 128

  dropout: 0.1

training:
  epochs: 25
  batch_size: 64
  learning_rate: 1e-4
  weight_decay: 5e-4
  grad_clip: 1.0
  warmup_steps: 2000
  patience: 4
  label_smoothing: 0
  device: cuda

reproducibility:
  seed: 42

special_tokens:
  pad: <pad>
  unk: <unk>
  bos: <bos>
  eos: <eos>
  finding: <finding>
  impression: <impression>

logging:
  run_name: null
  log_every: 50
  eval_every: 1

eval: 
  findings_label_path: "/home/public/mkamal/dataset/filtered_data/finding_labels.csv"
  impression_label_path: "/home/public/mkamal/dataset/filtered_data/impression_labels.csv"
  reports_label_path: "/home/public/mkamal/dataset/filtered_data/reports_label.csv"
  chestXbertModelWeights: "/home/grad/masters/2025/mkamal/mkamal/cxr_report_gen/utils/chexbert.pth"
  
