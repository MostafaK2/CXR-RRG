checkpoint:
  model_checkpoint_path: /home/public/mkamal/checkpoints
  model_save_name: multimodal_memory.pt
  resume: null
  save_best_only: true
  save_dir: results
data:
  csv_file: /home/public/mkamal/dataset/filtered_data/train/train_cleaned.csv
  h5_file: /home/public/mkamal/dataset/filtered_data/train/train.h5
  max_len: 256
  min_freq: 3
  num_workers: 8
  test_sz: 0.1
  valid_sz: 0.1
eval:
  chestXbertModelWeights: /home/grad/masters/2025/mkamal/mkamal/cxr_report_gen/utils/chexbert.pth
  findings_label_path: /home/public/mkamal/dataset/filtered_data/finding_labels.csv
  impression_label_path: /home/public/mkamal/dataset/filtered_data/impression_labels.csv
  reports_label_path: /home/public/mkamal/dataset/filtered_data/reports_label.csv
logging:
  eval_every: 1
  log_every: 50
  run_name: null
model:
  bert_freeze_layer: 12
  bert_max_length: 128
  bert_model: emilyalsentzer/Bio_ClinicalBERT
  d_model: 512
  decoder_ff_dim: 768
  decoder_layers: 4
  decoder_max_len: 256
  decoder_n_heads: 8
  dropout: 0.1
  fpn_dim: 256
  fpn_scale: 2
  fusion_ff_dim: 768
  fusion_heads: 8
  img_enc_backbone: swin_s
  img_enc_freeze_layer: 9
  pad_id: 0
  use_fpn: false
  vocab_size: 16000
reproducibility:
  seed: 42
special_tokens:
  bos: <bos>
  eos: <eos>
  finding: <finding>
  impression: <impression>
  pad: <pad>
  unk: <unk>
training:
  alpha: 0.3
  batch_size: 64
  device: cuda
  epochs: 25
  grad_clip: 1.0
  label_smoothing: 0
  learning_rate: 0.000314
  patience: 3
  warmup_steps: 1200
  weight_decay: 5e-4
